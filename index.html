<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>skintracker</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-brand">
                <div class="logo">
                    <svg class="logo-icon" width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- Background -->
                        <rect width="40" height="40" rx="10" fill="url(#logoBg)"/>
                        <!-- Crosshair circle -->
                        <circle cx="20" cy="20" r="10" stroke="rgba(255,255,255,0.85)" stroke-width="1.8" fill="none"/>
                        <!-- Crosshair lines -->
                        <line x1="20" y1="6" x2="20" y2="14" stroke="rgba(255,255,255,0.85)" stroke-width="1.8" stroke-linecap="round"/>
                        <line x1="20" y1="26" x2="20" y2="34" stroke="rgba(255,255,255,0.85)" stroke-width="1.8" stroke-linecap="round"/>
                        <line x1="6" y1="20" x2="14" y2="20" stroke="rgba(255,255,255,0.85)" stroke-width="1.8" stroke-linecap="round"/>
                        <line x1="26" y1="20" x2="34" y2="20" stroke="rgba(255,255,255,0.85)" stroke-width="1.8" stroke-linecap="round"/>
                        <!-- Center dot -->
                        <circle cx="20" cy="20" r="2" fill="#a29bfe"/>
                        <!-- Knife silhouette -->
                        <path d="M22 13l5.5 5.5c.4.4.4 1 0 1.4l-1.2 1.2c-.4.4-1 .4-1.4 0L19.5 15.5" stroke="rgba(255,255,255,0.6)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
                        <path d="M19.5 15.5l-4 4c-.3.3-.3.8 0 1.1l.4.4" stroke="rgba(255,255,255,0.4)" stroke-width="1.2" stroke-linecap="round" fill="none"/>
                        <defs>
                            <linearGradient id="logoBg" x1="0" y1="0" x2="40" y2="40">
                                <stop offset="0%" stop-color="#6C5CE7"/>
                                <stop offset="100%" stop-color="#4834d4"/>
                            </linearGradient>
                        </defs>
                    </svg>
                    <h1 class="brand-name">skintracker</h1>
                </div>
            </div>
            <div class="header-controls">
                <div class="header-selects">
                    <div class="stat stat-currency">
                        <span class="stat-label" data-i18n="statCurrency">Waluta</span>
                        <select id="currencySelect" class="currency-select">
                            <option value="USD">USD ($)</option>
                            <option value="PLN">PLN (zł)</option>
                            <option value="EUR">EUR (€)</option>
                            <option value="CNY">CNY (¥)</option>
                        </select>
                    </div>
                    <div class="stat stat-lang">
                        <span class="stat-label" data-i18n="statLanguage">Język</span>
                        <select id="langSelect" class="lang-select">
                            <option value="pl">PL</option>
                            <option value="en">EN</option>
                        </select>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Stats Bar -->
            <section class="stats-section">
                <div class="stats-bar">
                    <div class="stat">
                        <span class="stat-label" data-i18n="statInvestments">Inwestycje</span>
                        <span class="stat-value" id="totalInvestments">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label" data-i18n="statTotalQty">Łączna ilość</span>
                        <span class="stat-value" id="totalValue">0 szt.</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label" data-i18n="statTotalCost">Łączny koszt</span>
                        <span class="stat-value" id="totalCost">$0.00</span>
                    </div>
                </div>
            </section>
            <!-- Add Investment Panel -->
            <section class="panel add-panel">
                <div class="panel-header">
                    <h2 data-i18n="addInvestment">Dodaj inwestycję</h2>
                </div>
                <form id="investmentForm" class="investment-form">
                    <div class="form-row">
                        <div class="form-group form-group-large">
                            <label for="itemSearch" data-i18n="labelItem">Przedmiot</label>
                            <div class="autocomplete-wrapper">
                                <input type="text" id="itemSearch" data-i18n-placeholder="placeholderItem" placeholder="Wyszukaj przedmiot CS2..." autocomplete="off" required>
                                <div class="autocomplete-dropdown" id="autocompleteDropdown"></div>
                                <div class="db-status" id="dbStatus"></div>
                            </div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="platform" data-i18n="labelPlatform">Platforma</label>
                            <select id="platform" required>
                                <option value="" data-i18n="placeholderPlatform">Wybierz platformę...</option>
                                <option value="Steam Market">Steam Market</option>
                                <option value="CSFloat">CSFloat</option>
                                <option value="Skinport">Skinport</option>
                                <option value="Buff163">Buff163</option>
                                <option value="DMarket">DMarket</option>
                                <option value="Bitskins">Bitskins</option>
                                <option value="Tradeit.gg">Tradeit.gg</option>
                                <option value="Inne">Inne</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="quantity" data-i18n="labelQuantity">Ilość</label>
                            <input type="number" id="quantity" min="1" value="1" required>
                        </div>
                        <div class="form-group">
                            <label for="pricePerUnit"><span data-i18n="labelPricePerUnit">Cena za sztukę</span> (<span id="priceUnitLabel">$</span>)</label>
                            <input type="number" id="pricePerUnit" step="0.01" min="0.01" placeholder="0.00" required>
                        </div>
                        <div class="form-group">
                            <label for="purchaseDate" data-i18n="labelDate">Data zakupu</label>
                            <input type="date" id="purchaseDate" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="notes" data-i18n="labelNotes">Notatki (opcjonalne)</label>
                            <input type="text" id="notes" data-i18n-placeholder="placeholderNotes" placeholder="np. Float 0.001, Pattern 661...">
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="btnSubmit">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                            <span data-i18n="btnAddTransaction">Dodaj transakcję</span>
                        </button>
                    </div>
                </form>
            </section>

            <!-- Investments List -->
            <section class="panel investments-panel">
                <div class="panel-header">
                    <h2 data-i18n="yourInvestments">Twoje inwestycje</h2>
                    <div class="panel-actions">
                        <input type="text" id="filterSearch" class="filter-input" data-i18n-placeholder="filterPlaceholder" placeholder="Filtruj przedmioty...">
                        <select id="filterPlatform" class="filter-select">
                            <option value="" data-i18n="allPlatforms">Wszystkie platformy</option>
                            <option value="Steam Market">Steam Market</option>
                            <option value="CSFloat">CSFloat</option>
                            <option value="Skinport">Skinport</option>
                            <option value="Buff163">Buff163</option>
                            <option value="DMarket">DMarket</option>
                            <option value="Bitskins">Bitskins</option>
                            <option value="Tradeit.gg">Tradeit.gg</option>
                            <option value="Inne">Inne</option>
                        </select>
                        <button class="btn btn-sm btn-ghost" id="btnRefreshPrices" title="Refresh prices">
                            <span data-i18n="refreshPrices">Odśwież ceny</span>
                        </button>
                    </div>
                </div>
                <div class="investments-table-wrapper">
                    <table class="investments-table">
                        <thead>
                            <tr>
                                <th class="sortable" data-sort="name"><span data-i18n="colItem">Przedmiot</span> <span class="sort-icon">↕</span></th>
                                <th class="sortable" data-sort="quantity"><span data-i18n="colQuantity">Ilość</span> <span class="sort-icon">↕</span></th>
                                <th class="sortable" data-sort="avgPrice"><span data-i18n="colAvgPrice">Śr. cena zakupu</span> <span class="sort-icon">↕</span></th>
                                <th class="sortable" data-sort="totalSpent"><span data-i18n="colTotalCost">Łączny koszt</span> <span class="sort-icon">↕</span></th>
                                <th data-i18n="colLivePrice">Cena live</th>
                                <th data-i18n="colPL">Zysk/Strata</th>
                                <th data-i18n="colPlatform">Platforma</th>
                                <th data-i18n="colTranches">Transze</th>
                                <th data-i18n="colActions">Akcje</th>
                            </tr>
                        </thead>
                        <tbody id="investmentsTableBody">
                        </tbody>
                    </table>
                    <div class="empty-state" id="emptyState">
                        <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                            <rect x="8" y="16" width="48" height="36" rx="4" stroke="#555" stroke-width="2"/>
                            <path d="M8 28h48" stroke="#555" stroke-width="2"/>
                            <circle cx="32" cy="40" r="6" stroke="#555" stroke-width="2"/>
                            <path d="M30 40l2 2 4-4" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <h3 data-i18n="noInvestments">Brak inwestycji</h3>
                        <p data-i18n="noInvestmentsDesc">Dodaj swoją pierwszą inwestycję używając formularza powyżej</p>
                    </div>
                </div>
            </section>
        </main>

        <!-- Transaction Detail Modal -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal" id="transactionModal">
                <div class="modal-header">
                    <h3 id="modalTitle"></h3>
                    <button class="modal-close" id="modalClose">&times;</button>
                </div>
                <div class="modal-body" id="modalBody">
                </div>
            </div>
        </div>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/cs2db.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
